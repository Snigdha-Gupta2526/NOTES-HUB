<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Hub-SNIGDHA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    </div>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-book-open"></i> Notes Hub-SNIGDHA</h1>
            <p>Organize, store and share your study notes easily.</p>
        </header>
        <div class="controls">

            <div class="controls-container">

                <input type="text" id="searchInput" class="search-input" placeholder="Search by title, subject or category...">

                <div class="filter-group">

                    <select id="filterSelect" class="filter-select">
                        <option value="all">All Categories</option>
                        <option value="core-subject">Core Subject</option>
                        <option value="dsa">DSA</option>
                        <option value="web-development">Web Development</option>
                        <option value="ai-ml">AI / ML</option>
                        <option value="aptitude">Aptitude</option>
                        <option value="interview">Interview</option>
                        <option value="gk">GK</option>
                    </select>

                    <button id="addNoteBtn" class="add-btn">
                        <i class="fas fa-plus"></i> Add Note
                    </button>

                </div>

            </div>

        </div>


        <div id="notesContainer" class="notes-grid">
            <!-- Notes will appear here dynamically -->
        </div>

        <div id="emptyState" class="empty-state">

            <i class="fas fa-book"></i>

            <h2>No Notes Available</h2>

            <p>
                Start building your personal study library by adding your first note.
            </p>

        </div>

    </div>

    <div id="addNoteModal" class="modal-overlay">

        <div class="modal">

            <div class="modal-header">

                <h2>New Note</h2>

                <button id="closeModalBtn" class="modal-close">
                    <i class="fas fa-times"></i>
                </button>

            </div>

            <form id="notesForm" class="modal-body">
                <div class="form-group">

                    <label for="noteTitle">Title</label>

                    <input type="text" id="noteTitle" class="form-input" placeholder="Enter note title" required>

                </div>


                <div class="form-group">

                    <label for="subject">Subject</label>

                    <input type="text" id="subject" class="form-input" placeholder="Example: DBMS, Operating System" required>

                </div>



                <div class="form-group">

                    <label for="semester">Semester</label>

                    <select id="semester" class="form-input" required>

                        <option value="">Select Semester</option>

                        <option>1st Semester</option>
                        <option>2nd Semester</option>
                        <option>3rd Semester</option>
                        <option>4th Semester</option>
                        <option>5th Semester</option>
                        <option>6th Semester</option>
                        <option>7th Semester</option>
                        <option>8th Semester</option>

                    </select>

                </div>
                <div class="form-group">

                    <label>Category</label>

                    <div class="tag-options">

                        <label class="tag-option">
                            <input type="radio" name="noteTag" value="core-subject" checked>
                            <span><i class="fas fa-book"></i> Core Subject</span>
                        </label>

                        <label class="tag-option">
                            <input type="radio" name="noteTag" value="dsa">
                            <span><i class="fas fa-code"></i> DSA</span>
                        </label>

                        <label class="tag-option">
                            <input type="radio" name="noteTag" value="web-development">
                            <span><i class="fas fa-laptop-code"></i> Web Development</span>
                        </label>

                        <label class="tag-option">
                            <input type="radio" name="noteTag" value="ai-ml">
                            <span><i class="fas fa-robot"></i> AI / ML</span>
                        </label>

                        <label class="tag-option">
                            <input type="radio" name="noteTag" value="aptitude">
                            <span><i class="fas fa-brain"></i> Aptitude</span>
                        </label>

                        <label class="tag-option">
                            <input type="radio" name="noteTag" value="interview">
                            <span><i class="fas fa-user-tie"></i> Interview</span>
                        </label>

                        <label class="tag-option">
                            <input type="radio" name="noteTag" value="gk">
                            <span><i class="fas fa-globe"></i> GK</span>
                        </label>

                    </div>

                </div>

                <div class="form-group">

                    <label for="noteDescription">Description</label>

                    <textarea id="noteDescription" class="form-input form-textarea" rows="5" placeholder="Write a short description..." required></textarea>

                </div>
                <div class="form-group">

                    <label for="pdfLink">PDF Link</label>

                    <input type="url" id="pdfLink" class="form-input" placeholder="https://drive.google.com/..." required>

                </div>


                <div class="modal-footer">

                    <button type="submit" class="submit-btn">
                        <i class="fas fa-save"></i>
                        Save Note
                    </button>

                </div>

            </form>

        </div>

    </div>
    <div id="confirmModal" class="modal-overlay">

        <div class="modal confirmation-modal">

            <div class="modal-body">

                <h3>Delete Note</h3>

                <p>
                    Are you sure you want to delete this note?
                </p>

                <div class="confirmation-buttons">

                    <button id="cancelDeleteBtn" class="confirmation-btn cancel-btn">
                        Cancel
                    </button>

                    <button id="confirmDeleteBtn" class="confirmation-btn confirm-btn">
                        Delete
                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="index.js"></script>

</body>

</html>
